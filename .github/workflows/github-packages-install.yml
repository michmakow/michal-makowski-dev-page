name: CI, Coverage and GitHub Pages Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: read

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Install, Test, Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@michmakow"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN != '' && secrets.GH_PACKAGES_TOKEN || github.token }}

      - name: Run unit tests
        run: pnpm test

      - name: Run coverage (must be 100%)
        run: pnpm test:coverage

  deploy:
    name: Build and Deploy to GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@michmakow"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Compute GitHub Pages URL and base path
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_LOWER="michmakow"
          REPO_LOWER="$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')"

          if [ "$REPO_LOWER" = "${OWNER_LOWER}.github.io" ]; then
            echo "NEXT_PUBLIC_BASE_PATH=" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_SITE_URL=https://${OWNER_LOWER}.github.io" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_BASE_PATH=/${REPO_NAME}" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_SITE_URL=https://${OWNER_LOWER}.github.io/${REPO_NAME}" >> "$GITHUB_ENV"
          fi

          echo "GITHUB_PAGES=true" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN != '' && secrets.GH_PACKAGES_TOKEN || github.token }}

      - name: Build static export
        run: pnpm build

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

