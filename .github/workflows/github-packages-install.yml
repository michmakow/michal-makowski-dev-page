name: CI, Coverage and GitHub Pages Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: read

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Install, Test, Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@michmakow"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN != '' && secrets.GH_PACKAGES_TOKEN || github.token }}

      - name: Run unit tests
        run: pnpm test

      - name: Run coverage (must be 100%)
        run: pnpm test:coverage

  deploy:
    name: Build and Deploy to GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@michmakow"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Compute Pages URL and base path
        shell: bash
        env:
          CUSTOM_DOMAIN_INPUT: ${{ vars.CUSTOM_DOMAIN }}
          DEFAULT_OWNER: michmakow
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_LOWER="${DEFAULT_OWNER}"
          REPO_LOWER="$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')"
          CUSTOM_DOMAIN="$CUSTOM_DOMAIN_INPUT"

          if [ -z "$CUSTOM_DOMAIN" ] && [ -f CNAME ]; then
            CUSTOM_DOMAIN="$(cat CNAME)"
          fi

          if [ -z "$CUSTOM_DOMAIN" ] && [ -f public/CNAME ]; then
            CUSTOM_DOMAIN="$(cat public/CNAME)"
          fi

          CUSTOM_DOMAIN="$(echo "$CUSTOM_DOMAIN" | tr -d '\r' | xargs)"

          if [ -n "$CUSTOM_DOMAIN" ]; then
            DOMAIN_LOWER="$(echo "$CUSTOM_DOMAIN" | tr '[:upper:]' '[:lower:]')"
            echo "NEXT_PUBLIC_BASE_PATH=" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_SITE_URL=https://${DOMAIN_LOWER}" >> "$GITHUB_ENV"
            echo "CUSTOM_DOMAIN=${DOMAIN_LOWER}" >> "$GITHUB_ENV"
          elif [ "$REPO_LOWER" = "${OWNER_LOWER}.github.io" ]; then
            echo "NEXT_PUBLIC_BASE_PATH=" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_SITE_URL=https://${OWNER_LOWER}.github.io" >> "$GITHUB_ENV"
            echo "CUSTOM_DOMAIN=" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_BASE_PATH=/${REPO_NAME}" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_SITE_URL=https://${OWNER_LOWER}.github.io/${REPO_NAME}" >> "$GITHUB_ENV"
            echo "CUSTOM_DOMAIN=" >> "$GITHUB_ENV"
          fi

          echo "GITHUB_PAGES=true" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN != '' && secrets.GH_PACKAGES_TOKEN || github.token }}

      - name: Build static export
        run: pnpm build

      - name: Write custom domain CNAME
        if: env.CUSTOM_DOMAIN != ''
        run: echo "$CUSTOM_DOMAIN" > out/CNAME

      - name: Validate exported paths
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"

          if [ -n "$CUSTOM_DOMAIN" ]; then
            if grep -q "/${REPO_NAME}/_next/" out/index.html; then
              echo "Build still contains repository-prefixed asset paths for custom domain."
              exit 1
            fi

            if [ ! -f out/CNAME ]; then
              echo "CNAME file missing for custom domain build."
              exit 1
            fi
          fi

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
